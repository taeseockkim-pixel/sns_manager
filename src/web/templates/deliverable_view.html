{% extends "base.html" %}
{% block title %}{{ filename }} — CIMON SNS Manager{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/deliverables" class="text-sm text-blue-600 hover:underline">← 산출물 목록</a>
  <span class="text-slate-300">/</span>
  <span class="text-sm font-medium text-slate-700">{{ filename }}</span>
  <a href="/deliverables/download/{{ filename }}"
     class="ml-auto px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors">
    다운로드
  </a>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
  <div class="prose prose-slate max-w-none
              prose-headings:font-bold prose-h1:text-2xl prose-h2:text-xl prose-h3:text-base
              prose-table:text-sm prose-th:bg-slate-50 prose-th:font-semibold
              prose-code:bg-slate-100 prose-code:rounded prose-code:px-1 prose-code:text-sm">
    {{ content_html | safe }}
  </div>
</div>

<style>
  /* Markdown 렌더링 기본 스타일 (Tailwind typography 플러그인 없이) */
  .prose h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.75rem; color: #1e293b; }
  .prose h2 { font-size: 1.25rem; font-weight: 700; margin: 1.25rem 0 0.5rem; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
  .prose h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #334155; }
  .prose p { margin: 0.5rem 0; color: #475569; line-height: 1.7; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin: 0.5rem 0; color: #475569; }
  .prose li { margin: 0.2rem 0; }
  .prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
  .prose th { background: #f8fafc; padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; border: 1px solid #e2e8f0; color: #475569; }
  .prose td { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; color: #64748b; }
  .prose tr:hover td { background: #f8fafc; }
  .prose code { background: #f1f5f9; border-radius: 0.25rem; padding: 0.1rem 0.4rem; font-size: 0.875em; color: #1e40af; }
  .prose pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
  .prose pre code { background: none; color: inherit; padding: 0; }
  .prose strong { font-weight: 700; color: #1e293b; }
  .prose blockquote { border-left: 4px solid #e2e8f0; padding-left: 1rem; color: #64748b; font-style: italic; margin: 0.75rem 0; }
  .prose hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
</style>
{% endblock %}
